<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Currency Intelligence Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <h2>CurrencyIQ</h2>
  </nav>

  <section class="hero">
    <h1>Understand Global Currency Trends</h1>
    <p>Analyze exchange rates and explore insights from real-time data</p> </section>

  <main class="container">
    <h2 class="section-title">Live Exchange Rates</h2>
        <div class="base-currency">
          <p>Base Currency</p>
          <input id="base-code" value="USD" />
          <span id="base-rate">1.00</span>
        </div>
  
    <div class="controls">
  <input 
    type="text" 
    id="search" 
    placeholder="Search currency..." 
  />

  <button onclick="fetchCurrencies()" class="refresh-btn">
    Refresh
  </button>
</div>
<div class="sort-controls">
  <select id="sort-select">
    <option value="default" selected>Default</option>
    <option value="high">Rate: High → Low</option>
    <option value="low">Rate: Low → High</option>
    
  </select>
</div>
    <div id="loading">Fetching latest data...</div>

    <div id="currency-container"></div>
    <button id="view-more">View More</button>
  </main>

  <footer class="footer">
    <p>© 2026 Currency Intelligence Dashboard</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
